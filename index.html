<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Geolocalização</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <style>
        :root {
            --bg-color: #1a1a1a;
            --sidebar-color: #2c2c2c;
            --text-color: #e0e0e0;
            --accent-color: #4CAF50;
            --remove-color: #f44336;
            --filter-color: #9C27B0;
            --data-color: #FF9800;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; height: 100vh; overflow: hidden;
            position: relative;
        }

        #sidebar {
            width: 350px; min-width: 350px; 
            background-color: var(--sidebar-color);
            padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; z-index: 2000; 
            overflow-y: auto; overflow-x: hidden;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        #sidebar.collapsed { width: 0; min-width: 0; padding-left: 0; padding-right: 0; border: none; }

        #map-container { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        #map { height: 100%; width: 100%; background: #000; }
        
        .hamburger-btn {
            position: absolute; top: 15px; left: 15px; z-index: 2001;
            background-color: var(--sidebar-color); color: white; border: 1px solid #555;
            border-radius: 5px; padding: 8px 12px; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: background-color 0.3s;
        }
        .hamburger-btn:hover { background-color: #444; }

        h2, h3 { margin-top: 0; }

        .file-upload-wrapper {
            margin-bottom: 20px; padding: 15px; border: 2px dashed #555;
            border-radius: 8px; text-align: center;
        }
        input[type="file"] { display: none; }
        .custom-file-upload {
            display: inline-block; padding: 10px 20px; cursor: pointer;
            background-color: #00695c; border-radius: 5px; transition: 0.3s; width: 94%;
            margin-bottom: 10px; font-weight: bold; box-sizing: border-box;
            font-size: 0.8rem;
        }
        .custom-file-upload:hover { background-color: #004d40; }

        /* --- Secções Retráteis --- */
        .collapsible-section { background-color: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .border-filter { border-left: 4px solid var(--filter-color); }
        .border-data { border-left: 4px solid var(--data-color); }

        .section-header {
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            margin: 0; transition: color 0.2s; user-select: none;
        }
        .section-header:hover { color: #fff; }
        .section-content { margin-top: 15px; overflow: hidden; transition: max-height 0.3s ease; }
        .collapsed-content { display: none; } 

        .filter-group { margin-bottom: 10px; }
        .filter-group label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #bbb; }
        .filter-group input[type="text"], .filter-group input[type="number"] {
            width: 90%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #222; color: white; color-scheme: dark; box-sizing: border-box;
        }
        .btn-action {
            width: 100%; padding: 10px; background-color: var(--filter-color);
            color: white; border: none; border-radius: 4px; cursor: pointer;
            font-weight: bold; margin-top: 5px; transition: 0.3s; box-sizing: border-box;
        }
        .btn-action:hover { background-color: #7B1FA2; }
        
        /* --- Estilo Corrigido da Div de Botões --- */
        .code-buttons-wrapper {
            display: flex;
            gap: 10px;
            width: 94%;
            margin: 10px auto 0 auto;
        }
        .btn-code-generate, .btn-code-import {
            background-color: #444 !important;
            margin: 0 !important;
            flex: 1;
        }
        .btn-code-generate:hover, .btn-code-import:hover {
            background-color: #555 !important;
        }

        .btn-download {
            background-color: #1976D2 !important;
            width: 94%;
            margin: 0 auto !important; 
            display: block;
        }
        .btn-download:hover { background-color: #1565C0 !important; }

        /* --- Paleta de Cores Chips --- */
        .color-palette-container {
            display: flex; gap: 6px; align-items: center; margin-top: 5px; flex-wrap: wrap;
        }
        .color-chip {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
        }
        .color-chip:hover { transform: scale(1.1); }
        .color-chip.selected { border-color: #fff; transform: scale(1.1); }

        /* --- Lista de Ficheiros --- */
        #file-list-container h3 { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px;}
        #file-list { list-style: none; padding: 0; margin: 0; }
        .file-item {
            background-color: #3a3a3a; margin-bottom: 10px; padding: 12px;
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
        }
        .file-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 80px; }
        .btn-plot { background-color: var(--accent-color); color: white; }
        .btn-plot:hover { background-color: #43a047; }
        .btn-remove { background-color: var(--remove-color); color: white; }
        .btn-remove:hover { background-color: #d32f2f; }

        /* --- Lista de Dados Importados --- */
        .data-item {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #2a2a2a; border: 1px solid #444; padding: 8px;
            margin-bottom: 5px; border-radius: 4px; gap: 8px;
            content-visibility: auto;
            contain-intrinsic-size: auto 42px;
        }
        .data-item-left { display: flex; align-items: center; gap: 8px; overflow: hidden; flex: 1; }
        .data-item-name { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .data-item-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        .icon-btn {
            background: transparent; border: none; cursor: pointer; padding: 4px;
            font-size: 1rem; border-radius: 4px; transition: 0.2s;
        }
        .icon-btn:hover { background-color: #444; }
        
        .inline-color-picker {
            padding: 0; width: 20px; height: 20px; border: none; 
            background: transparent; cursor: pointer; border-radius: 50%;
        }
        .inline-radius-picker {
            width: 65px; padding: 2px 4px; border: 1px solid #555;
            background: #222; color: #fff; border-radius: 4px;
            font-size: 0.8rem; text-align: center;
        }

        .count-icon {
            background: rgba(255, 50, 50, 0.8); border: 2px solid white; color: white;
            font-weight: bold; text-align: center; border-radius: 50%;
            line-height: 30px; box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        .leaflet-control-layers {
            background: rgba(44, 44, 44, 0.9) !important; color: #e0e0e0 !important;
            border: 1px solid #555 !important; border-radius: 5px !important;
        }

        /* Modais e Grupos */
        #delete-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #333; padding: 20px; border-radius: 8px; text-align: center;
            border: 1px solid #555; min-width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-confirm-del { background: #f44336; color: white; }
        .btn-cancel { background: #555; color: white; }

        .radio-group {
            background: #222; padding: 10px; border-radius: 4px; 
            display: flex; gap: 15px; border: 1px solid #555;
            box-sizing: border-box; width: 90%; flex-wrap: wrap;
        }
        .radio-group label { margin: 0; cursor: pointer; display: flex; align-items: center; gap: 5px;}

        .mass-action-wrapper {
            display: flex; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #444;
        }
        .btn-mass-action {
            flex: 1; padding: 6px; background-color: #444; color: #fff; 
            border: 1px solid #555; border-radius: 4px; cursor: pointer; 
            font-size: 0.8rem; transition: 0.2s;
        }
        .btn-mass-action:hover { background-color: #555; }

        @media (max-width: 768px) {
            #sidebar {
                position: absolute; top: 0; left: 0; height: 100%; width: 85%; max-width: 350px;
                transform: translateX(0);
            }
            #sidebar.collapsed { transform: translateX(-100%); width: 85%; padding-left: 20px; padding-right: 20px; }
            #sidebar h2 { margin-top: 40px; }
            .data-item { flex-direction: column; align-items: flex-start; }
            .data-item-left { width: 100%; margin-bottom: 5px; }
            .data-item-right { width: 100%; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Análise de Geolocalização</h2>
        
        <div class="file-upload-wrapper">
            <label for="file-upload" class="custom-file-upload">📂 Importar (CSV / Excel / JSON)</label>
            <input id="file-upload" type="file" accept=".csv, .xlsx, .xls, .json"/>
            <button class="btn-action btn-download" onclick="exportVisiblePointsToJson()">💾 Baixar  (JSON)</button>           
            
            <div class="code-buttons-wrapper">
                <button class="btn-action btn-code-generate" onclick="generateShareCode()">🔗 Copiar</button>
                <button class="btn-action btn-code-import" onclick="importShareCode()">📥 Colar </button>
            </div>
        </div>

        <div class="collapsible-section border-filter">
            <h3 class="section-header" onclick="toggleSection('manual-content', 'manual-icon')">
                Adicionar Ponto Manual <span id="manual-icon">▼</span>
            </h3>
            <div id="manual-content" class="section-content collapsed-content">
                <div class="filter-group">
                    <label>Rótulo (Nome):</label>
                    <input type="text" id="manual-name" placeholder="Ex: Alvo Alpha / Antena Central">
                </div>
                
                <div class="filter-group">
                    <label>Tipo de Registro:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="manual-type" value="geoloc" checked onchange="toggleManualType()"> Geoloc</label>
                        <label><input type="radio" name="manual-type" value="erb" onchange="toggleManualType()"> ERB (Antena)</label>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="filter-group" style="flex: 1;">
                        <label>Latitude:</label>
                        <input type="number" id="manual-lat" step="any" placeholder="-23.5505">
                    </div>
                    <div class="filter-group" style="flex: 1;">
                        <label>Longitude:</label>
                        <input type="number" id="manual-lon" step="any" placeholder="-46.6333">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Selecione a Cor do Ponto:</label>
                    <div class="color-palette-container">
                        <div class="color-chip selected" style="background: #e53935;" onclick="selectPaletteColor('#e53935', this)"></div>
                        <div class="color-chip" style="background: #1e88e5;" onclick="selectPaletteColor('#1e88e5', this)"></div>
                        <div class="color-chip" style="background: #43a047;" onclick="selectPaletteColor('#43a047', this)"></div>
                        <div class="color-chip" style="background: #ffb300;" onclick="selectPaletteColor('#ffb300', this)"></div>
                        <div class="color-chip" style="background: #8e24aa;" onclick="selectPaletteColor('#8e24aa', this)"></div>
                        <div class="color-chip" style="background: #f4511E;" onclick="selectPaletteColor('#f4511E', this)"></div>
                        <div class="color-chip" style="background: #00acc1;" onclick="selectPaletteColor('#00acc1', this)"></div>
                        <input type="color" id="manual-color" value="#e53935" style="padding: 0; width: 24px; height: 24px; border: none; background: transparent; cursor: pointer;" onchange="selectPaletteColor(this.value, null)">
                    </div>
                </div>

                <div id="erb-controls" style="display: none; background: #2a2a2a; padding: 10px; border-radius: 4px; border-left: 3px solid var(--accent-color); margin-bottom: 10px;">
                    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <div class="filter-group" style="flex: 1; min-width: 80px; margin: 0;">
                            <label>Azimute:</label>
                            <input type="number" id="manual-azim" step="any" placeholder="Ex: 120" style="width: 100%;">
                        </div>
                        <div class="filter-group" style="flex: 2; min-width: 120px; margin: 0;">
                            <label>Raio (m): <span id="radius-val" style="color: var(--accent-color); font-weight: bold;">2000</span></label>
                            <input type="range" id="manual-radius" min="100" max="5000" step="100" value="2000" oninput="document.getElementById('radius-val').innerText = this.value" style="width: 100%; cursor: pointer;">
                        </div>
                    </div>
                </div>

                <button class="btn-action" onclick="addManualPoint()">➕ Inserir no Mapa</button>
            </div>
        </div>

        <div class="collapsible-section border-data">
            <h3 class="section-header" onclick="toggleSection('data-content', 'data-icon')">
                Dados Importados <span id="data-icon">▼</span>
            </h3>
            <div id="data-content" class="section-content collapsed-content">
                <div class="mass-action-wrapper">
                    <button class="btn-mass-action" onclick="toggleAllPoints(true)">☑️ Marcar Todos</button>
                    <button class="btn-mass-action" onclick="toggleAllPoints(false)">☐ Desmarcar Todos</button>
                </div>
                <ul id="imported-data-list" style="list-style:none; padding:0; margin:0; max-height: 400px; overflow-y: auto; overflow-x: hidden;">
                    <li style="color:#777; font-size:0.85rem; text-align:center;">Nenhum dado plotado no momento.</li>
                </ul>
            </div>
        </div>

        <div id="file-list-container">
            <h3>Ficheiros em Análise</h3>
            <ul id="file-list"></ul>
        </div>
    </div>

    <div id="map-container">
        <button class="hamburger-btn" onclick="toggleSidebar()" title="Recolher/Expandir Menu">☰</button>
        <div id="map"></div>
    </div>

    <div id="delete-modal">
        <div class="modal-content">
            <p>Tem a certeza que deseja excluir permanentemente esta linha de registo?</p>
            <button class="modal-btn btn-confirm-del" onclick="confirmDelete()">Excluir</button>
            <button class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <script>
        // --- INTERFACE ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }

        document.getElementById('map-container').addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('collapsed')) {
                    if (!e.target.classList.contains('hamburger-btn')) {
                        sidebar.classList.add('collapsed');
                        setTimeout(() => { map.invalidateSize(); }, 300);
                    }
                }
            }
        });

        function toggleSection(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            content.classList.toggle('collapsed-content');
            icon.innerText = content.classList.contains('collapsed-content') ? '▼' : '▲';
        }

        function toggleManualType() {
            const isErb = document.querySelector('input[name="manual-type"]:checked').value === 'erb';
            document.getElementById('erb-controls').style.display = isErb ? 'block' : 'none';
        }

        function selectPaletteColor(color, element) {
            document.getElementById('manual-color').value = color;
            document.querySelectorAll('.color-chip').forEach(chip => chip.classList.remove('selected'));
            if(element) element.classList.add('selected');
        }

        let eventToDeleteId = null;
        function openDeleteModal(id) {
            eventToDeleteId = id;
            document.getElementById('delete-modal').style.display = 'flex';
        }
        function closeModal() {
            eventToDeleteId = null;
            document.getElementById('delete-modal').style.display = 'none';
        }
        function confirmDelete() {
            if (eventToDeleteId && pointMetadata[eventToDeleteId]) {
                pointMetadata[eventToDeleteId].deleted = true;
                redrawAllPlotted();
            }
            closeModal();
        }

        // --- MAPA ---
        const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        const osmStreets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        const esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

        const map = L.map('map', { zoomControl: false, layers: [osmStreets] }).setView([-15.78, -47.92], 4);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({ "Ruas": osmStreets, "Modo Escuro": cartoDark, "Satélite": esriSatellite }, null, { position: 'topright' }).addTo(map);

        // --- DADOS E METADADOS ---
        let fileCounter = 0;
        let pointCounter = 0;
        let loadedFilesData = [];
        let pointMetadata = {}; 
        const globalUniqueSignatures = new Set();

        function parseCoordinate(val) {
            if (typeof val === 'number') return val;
            if (val === undefined || val === null || val === '') return NaN;
            return parseFloat(String(val).replace(',', '.'));
        }

        function cleanString(str) {
            if (str === undefined || str === null) return '';
            return String(str)
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim()
                .toLowerCase();
        }

        function formatDateTimeValue(dateStr, horaStr) {
            let formattedDate = String(dateStr || '').trim();
            let formattedTime = String(horaStr || '').trim();
            if (formattedDate && formattedDate.length === 8 && /^\d+$/.test(formattedDate)) {
                formattedDate = formattedDate.substring(0, 2) + '/' + formattedDate.substring(2, 4) + '/' + formattedDate.substring(4, 8);
            }
            if (formattedTime && formattedTime.length === 6 && /^\d+$/.test(formattedTime)) {
                formattedTime = formattedTime.substring(0, 2) + ':' + formattedTime.substring(2, 4) + ':' + formattedTime.substring(4, 6);
            }
            let result = '';
            if (formattedDate) result += formattedDate;
            if (formattedTime) result += (result ? ' ' : '') + formattedTime;
            return result;
        }

        function parseDMS(dmsStr) {
            if (!dmsStr) return NaN;
            const cleaned = String(dmsStr).replace(',', '.').trim();
            const isNegative = cleaned.startsWith('-');
            const absoluteStr = isNegative ? cleaned.substring(1) : cleaned;
            const parts = absoluteStr.split(/[-/\s_]+/).map(p => parseFloat(p)).filter(p => !isNaN(p));
            if (parts.length === 0) return NaN;
            let decimal = parts[0];
            if (parts.length > 1) {
                decimal += parts[1] / 60;
            }
            if (parts.length > 2) {
                decimal += parts[2] / 3600;
            }
            return isNegative ? -decimal : decimal;
        }

        function extractCoordinatesFromAddress(addressStr) {
            if (!addressStr) return null;
            const lower = String(addressStr).toLowerCase();
            const latMatch = lower.match(/latitude\s+([-\d,]+)/);
            const lonMatch = lower.match(/longitude\s+([-\d,]+)/);
            const azimMatch = lower.match(/azimute\s+(\d+)/);
            if (!latMatch || !lonMatch) return null;
            const lat = parseDMS(latMatch[1]);
            const lon = parseDMS(lonMatch[1]);
            const azim = azimMatch ? parseFloat(azimMatch[1]) : null;
            if (isNaN(lat) || isNaN(lon)) return null;
            return { lat, lon, azim };
        }

        function computeDestinationPoint(start, distance, bearing) {
            const R = 6378137; const brng = bearing * Math.PI / 180;
            const lat1 = start.lat * Math.PI / 180; const lon1 = start.lng * Math.PI / 180;
            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distance / R) + Math.cos(lat1) * Math.sin(distance / R) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distance / R) * Math.cos(lat1), Math.cos(distance / R) - Math.sin(lat1) * Math.sin(lat2));
            return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
        }
        function createSector(center, radius, azimuth, beamwidth) {
            const points = [center];
            const startLatLng = { lat: center[0], lng: center[1] };
            for (let i = 0; i <= 50; i++) {
                const angle = (azimuth - beamwidth / 2) + (i * beamwidth / 50);
                points.push(computeDestinationPoint(startLatLng, radius, angle));
            }
            return points;
        }

        // --- SHARE CODE ---
        function generateShareCode() {
            let exportData = [];
            loadedFilesData.forEach(fileObj => {
                if (fileObj.isPlotted) {
                    fileObj.filteredPoints.forEach(pt => {
                        const meta = pointMetadata[pt.id];
                        if (meta && !meta.deleted && meta.visible) {
                            let pointToSave = {
                                n: meta.name,
                                la: parseFloat(pt.lat.toFixed(5)),
                                lo: parseFloat(pt.lon.toFixed(5))
                            };
                            let isErb = (pt.azim !== null && pt.azim !== undefined && !isNaN(pt.azim));
                            if (isErb) {
                                pointToSave.az = parseFloat(pt.azim.toFixed(2));
                            }
                            if (meta.radius && meta.radius !== 2000) {
                                pointToSave.r = meta.radius;
                            }
                            let defaultColor = isErb ? '#1e88e5' : '#e53935';
                            if (meta.color && meta.color.toLowerCase() !== defaultColor) {
                                pointToSave.c = meta.color;
                            }
                            exportData.push(pointToSave);
                        }
                    });
                }
            });

            if (exportData.length === 0) {
                alert("Nenhum ponto visível no mapa para gerar código.");
                return;
            }

            try {
                const jsonString = JSON.stringify(exportData);
                const compressedData = LZString.compressToBase64(jsonString);
                const finalCode = `OPMAP-${compressedData}`;

                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(finalCode).then(() => {
                        alert("✅ Código copiado para a área de transferência!");
                    }).catch(err => {
                        prompt("Copie o código abaixo:", finalCode);
                    });
                } else {
                    prompt("Copie o código abaixo:", finalCode);
                }
            } catch(e) {
                alert("Erro ao gerar o código de compartilhamento.");
            }
        }

        function importShareCode() {
            const code = prompt("📥 Cole o código de compartilhamento (OPMAP-...) aqui:");
            if (!code || code.trim() === "") return;

            try {
                let cleanCode = code.trim();
                if (cleanCode.startsWith('OPMAP-')) {
                    cleanCode = cleanCode.replace('OPMAP-', '');
                }
                let jsonString = LZString.decompressFromBase64(cleanCode);
                let parsedData;
                if (jsonString) {
                    parsedData = JSON.parse(jsonString);
                } else {
                    parsedData = JSON.parse(decodeURIComponent(atob(cleanCode)));
                }

                if (Array.isArray(parsedData)) {
                    const mappedData = parsedData.map(item => {
                        let isErb = (item.az !== undefined && item.az !== null);
                        return {
                            name: item.n,
                            lat: item.la,
                            lon: item.lo,
                            azim: isErb ? item.az : null,
                            radius: item.r !== undefined ? item.r : 2000,
                            color: item.c !== undefined ? item.c : (isErb ? '#1e88e5' : '#e53935'),
                            timestamp: item.t || Date.now()
                        };
                    });
                    processJsonData("🔗 Dados Importados por Código", mappedData);
                } else {
                    alert("O código não contém dados válidos.");
                }
            } catch (e) {
                alert("❌ Código inválido ou corrompido.");
            }
        }

        // --- EXPORTAR JSON ---
        function exportVisiblePointsToJson() {
            let exportData = [];
            loadedFilesData.forEach(fileObj => {
                if (fileObj.isPlotted) {
                    fileObj.filteredPoints.forEach(pt => {
                        const meta = pointMetadata[pt.id];
                        if (meta && !meta.deleted && meta.visible) {
                            exportData.push({
                                name: meta.name,
                                lat: pt.lat,
                                lon: pt.lon,
                                azim: pt.azim,
                                radius: meta.radius || 2000,
                                color: meta.color,
                                timestamp: pt.timestamp
                            });
                        }
                    });
                }
            });

            if (exportData.length === 0) {
                alert("Nenhum ponto visível no mapa para exportar.");
                return;
            }

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", url);
            downloadAnchorNode.setAttribute("download", `mapa_exportado_${new Date().getTime()}.json`);
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            URL.revokeObjectURL(url);
        }

        function processJsonData(fileName, jsonData) {
            const extractedPoints = [];
            let duplicadosIgnorados = 0;

            jsonData.forEach(item => {
                const lat = typeof item.lat === 'number' ? item.lat : parseFloat(item.lat);
                const lon = typeof item.lon === 'number' ? item.lon : parseFloat(item.lon);
                const azim = item.azim !== null && item.azim !== undefined ? (typeof item.azim === 'number' ? item.azim : parseFloat(item.azim)) : null;
                const radius = item.radius ? (typeof item.radius === 'number' ? item.radius : parseInt(item.radius, 10)) : 2000;
                const color = item.color || (azim !== null ? '#1e88e5' : '#e53935');
                const name = item.name || 'Ponto Importado JSON';
                const timestamp = item.timestamp || Date.now();

                if (isNaN(lat) || isNaN(lon)) return;

                const signature = `${name}_${lat}_${lon}_${azim}`;
                if (globalUniqueSignatures.has(signature)) { duplicadosIgnorados++; return; }
                globalUniqueSignatures.add(signature);

                const eventId = 'evt_' + (++pointCounter);
                pointMetadata[eventId] = { name: name, visible: true, deleted: false, color: color, radius: radius };
                extractedPoints.push({ id: eventId, lat, lon, timestamp, azim });
            });

            if (extractedPoints.length === 0) {
                if (duplicadosIgnorados > 0) { return alert(`Todos os ${duplicadosIgnorados} registros já estão no mapa.`); }
                return alert("Nenhum dado válido processado.");
            }

            loadedFilesData.push({
                id: ++fileCounter, name: fileName,
                allPoints: extractedPoints, filteredPoints: extractedPoints,
                layers: { heat: null, cluster: null, erbs: null }, isPlotted: true 
            });
            updateFileListUI();
            redrawAllPlotted(true);
        }

        // --- DETECÇÃO DE CABEÇALHOS EM ARQUIVOS ---
        function extractDataWithDynamicHeader(raw2DArray) {
            if (!raw2DArray || raw2DArray.length === 0) return null;
            let headerIndex = -1;
            let headers = [];

            for (let i = 0; i < raw2DArray.length; i++) {
                const row = raw2DArray[i];
                if (!row || !Array.isArray(row)) continue;
                const rowStrings = row.map(cell => cleanString(cell));
                const temLat = rowStrings.some(str => str.includes('latitude') || str === 'lat');
                const temLon = rowStrings.some(str => str.includes('longitude') || str === 'lon' || str === 'lng');
                const temEndereco = rowStrings.some(str => str.includes('endereco'));
                const temCgi = rowStrings.some(str => str.includes('cgi') || str.includes('erb') || str.includes('celula'));
                if ((temLat && temLon) || temEndereco || temCgi) { headerIndex = i; headers = row.map(cell => cell ? String(cell) : ""); break; }
            }

            if (headerIndex === -1) return null;

            const extractedData = [];
            for (let i = headerIndex + 1; i < raw2DArray.length; i++) {
                const row = raw2DArray[i];
                if (!row || row.length === 0) continue;
                const obj = {};
                let isRowEmpty = true;
                for (let j = 0; j < headers.length; j++) {
                    const colName = headers[j] ? String(headers[j]).trim() : ('_col_' + j);
                    obj[colName] = row[j];
                    if (row[j] !== undefined && row[j] !== null && String(row[j]).trim() !== "") { isRowEmpty = false; }
                }
                if (!isRowEmpty) { extractedData.push(obj); }
            }
            return extractedData;
        }

        // --- IMPORTAÇÃO DE ARQUIVOS FÍSICOS ---
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileName = file.name.toLowerCase();

            if (fileName.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const parsedData = JSON.parse(event.target.result);
                        if (Array.isArray(parsedData)) { processJsonData(file.name, parsedData); } 
                        else { alert("Formato incorreto do JSON."); }
                    } catch(err) { alert("Erro ao ler o arquivo JSON."); }
                };
                reader.readAsText(file);
            } 
            else if (fileName.endsWith('.csv')) {
                Papa.parse(file, {
                    header: false, skipEmptyLines: true, dynamicTyping: true,
                    complete: function(results) {
                        if (results.data && results.data.length > 0) {
                            const jsonData = extractDataWithDynamicHeader(results.data);
                            if (jsonData) { processRawDataFile(file.name, jsonData); } 
                            else { alert(`Colunas geográficas não localizadas em "${file.name}".`); }
                        }
                    }
                });
            } 
            else if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    
                    // Recalcula o range (dimensão) de cada aba no workbook
                    workbook.SheetNames.forEach(name => {
                        const ws = workbook.Sheets[name];
                        if (ws) {
                            const range = { s: { r: Infinity, c: Infinity }, e: { r: 0, c: 0 } };
                            let hasCells = false;
                            Object.keys(ws).forEach(x => {
                                if (x[0] !== "!") {
                                    hasCells = true;
                                    const decoded = XLSX.utils.decode_cell(x);
                                    range.s.c = Math.min(range.s.c, decoded.c);
                                    range.s.r = Math.min(range.s.r, decoded.r);
                                    range.e.c = Math.max(range.e.c, decoded.c);
                                    range.e.r = Math.max(range.e.r, decoded.r);
                                }
                            });
                            if (hasCells) {
                                ws['!ref'] = XLSX.utils.encode_range(range);
                            }
                        }
                    });

                    // Verifica se há alguma aba de antenas para gerar o cgiMap
                    const antennaSheetName = workbook.SheetNames.find(name => {
                        const l = cleanString(name);
                        return l.includes('antena') || l.includes('erb');
                    });
                    
                    let cgiMap = {};
                    if (antennaSheetName) {
                        const wsAntena = workbook.Sheets[antennaSheetName];
                        const rawArrayAntena = XLSX.utils.sheet_to_json(wsAntena, {header: 1, defval: ""});
                        
                        let headerIndex = -1;
                        let headers = [];
                        for (let i = 0; i < rawArrayAntena.length; i++) {
                            const row = rawArrayAntena[i];
                            if (!row || !Array.isArray(row)) continue;
                            const rowStrings = row.map(cell => cleanString(cell));
                            const temCgi = rowStrings.some(str => str.includes('cgi') || str.includes('erb'));
                            const temLat = rowStrings.some(str => str.includes('latitude') || str === 'lat');
                            if (temCgi && temLat) { headerIndex = i; headers = row.map(cell => cell ? String(cell) : ""); break; }
                        }
                        
                        if (headerIndex !== -1) {
                            for (let i = headerIndex + 1; i < rawArrayAntena.length; i++) {
                                const row = rawArrayAntena[i];
                                if (!row || row.length === 0) continue;
                                let cgiCode = '';
                                let latVal = undefined;
                                let lonVal = undefined;
                                let azimVal = null;
                                
                                for (let j = 0; j < headers.length; j++) {
                                    const colName = cleanString(headers[j]);
                                    const val = row[j];
                                    if (colName === 'cgi/erb' || colName === 'cgi' || colName === 'erb') {
                                        cgiCode = String(val || '').trim();
                                    } else if (colName === 'latitude') {
                                        latVal = val;
                                    } else if (colName === 'longitude') {
                                        lonVal = val;
                                    } else if (colName === 'azimute' || colName === 'azimuth') {
                                        azimVal = val;
                                    }
                                }
                                
                                if (cgiCode && latVal !== undefined && lonVal !== undefined) {
                                    const lat = parseCoordinate(latVal);
                                    const lon = parseCoordinate(lonVal);
                                    const azim = azimVal !== null && azimVal !== '' ? parseCoordinate(azimVal) : null;
                                    if (!isNaN(lat) && !isNaN(lon)) {
                                        cgiMap[cgiCode] = { lat, lon, azim };
                                    }
                                }
                            }
                        }
                    }

                    // Encontra a melhor aba de dados/conexões para processar
                    // 1. Prioridade máxima: Abas de conexões ou extratos
                    let targetSheetName = workbook.SheetNames.find(name => {
                        const l = cleanString(name);
                        return l.includes('extrato conexoes') || l.includes('conexoes') || l.includes('trafego');
                    });
                    
                    // 2. Prioridade média: Abas de eventos ou chamadas (mas ignorando portabilidade que é vazia)
                    if (!targetSheetName) {
                        targetSheetName = workbook.SheetNames.find(name => {
                            const l = cleanString(name);
                            return (l.includes('eventos') || l.includes('chamadas')) && !l.includes('portabilidade');
                        });
                    }
                    
                    // 3. Fallback: Qualquer aba que não seja de antenas, pesquisa ou portabilidade
                    if (!targetSheetName) {
                        targetSheetName = workbook.SheetNames.find(name => {
                            const l = cleanString(name);
                            return !l.includes('antena') && !l.includes('erb') && !l.includes('pesquisa') && !l.includes('portabilidade');
                        }) || workbook.SheetNames[0];
                    }
                    
                    const sheet = workbook.Sheets[targetSheetName];
                    const rawArray = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                    if (rawArray && rawArray.length > 0) {
                        const jsonData = extractDataWithDynamicHeader(rawArray);
                        if (jsonData) { 
                            processRawDataFile(file.name, jsonData, cgiMap); 
                        } 
                        else { 
                            alert(`Colunas geográficas não localizadas em "${file.name}".`); 
                        }
                    }
                };
                reader.readAsArrayBuffer(file);
            }
            this.value = '';
        });

        function processRawDataFile(fileName, rawData, cgiMap = {}) {
            if (!rawData || rawData.length === 0) return;

            const extractedPoints = [];
            let duplicadosIgnorados = 0;

            rawData.forEach(row => {
                let latVal = undefined;
                let lonVal = undefined;
                let azimVal = null;
                let dataStr = '';
                let horaStr = '';
                let fallbackDateTime = '';
                let col4Val = '';
                let enderecoVal = '';

                for (const key in row) {
                    if (!Object.prototype.hasOwnProperty.call(row, key)) continue;
                    const normKey = cleanString(key);
                    const val = row[key];
                    if (normKey === 'latitude') {
                        if (latVal === undefined) latVal = val;
                    } else if (normKey === 'latitude_rs' || normKey.includes('latitude_rs') || normKey === 'latitude rs') {
                        latVal = val;
                    } else if (normKey === 'latitude_re' || normKey.includes('latitude_re') || normKey === 'latitude re') {
                        if (latVal === undefined) latVal = val;
                    }
                    else if (normKey === 'longitude') {
                        if (lonVal === undefined) lonVal = val;
                    } else if (normKey === 'longitude_rs' || normKey.includes('longitude_rs') || normKey === 'longitude rs') {
                        lonVal = val;
                    } else if (normKey === 'longitude_re' || normKey.includes('longitude_re') || normKey === 'longitude re') {
                        if (lonVal === undefined) lonVal = val;
                    }
                    else if (normKey === 'azimute' || normKey === 'azimuth') {
                        if (azimVal === null) azimVal = val;
                    } else if (normKey === 'azimute_rs' || normKey === 'azimuth_rs' || normKey.includes('azimute_rs') || normKey.includes('azimuth_rs') || normKey === 'azimute rs' || normKey === 'azimuth rs') {
                        azimVal = val;
                    } else if (normKey === 'azimute_re' || normKey === 'azimuth_re' || normKey.includes('azimute_re') || normKey.includes('azimuth_re') || normKey === 'azimute re' || normKey === 'azimuth re') {
                        if (azimVal === null) azimVal = val;
                    }
                    else if (normKey === 'data do evento' || normKey === 'data evento' || normKey === 'data' || normKey === 'data_evento' || normKey === 'data ini' || normKey === 'data_ini' || normKey === 'data_inicio' || normKey === 'data inicio') dataStr = val;
                    else if (normKey === 'hora do evento' || normKey === 'hora evento' || normKey === 'hora' || normKey === 'hora_evento' || normKey === 'hora ini' || normKey === 'hora_ini' || normKey === 'hora_inicio' || normKey === 'hora inicio') horaStr = val;
                    else if (normKey === 'data e hora' || normKey === 'data hora' || normKey === 'timestamp' || normKey === 'inicio' || normKey === 'data inicio' || normKey === 'hora local (fim)' || normKey === 'hora local (inicio)') fallbackDateTime = val;
                    else if (normKey === '_col_4') col4Val = val;
                    else if (normKey === 'endereco final' || normKey === 'endereco inicial' || normKey === 'endereco inicial ') {
                        if (val && cleanString(val).includes('latitude') && cleanString(val).includes('longitude')) {
                            enderecoVal = val;
                        }
                    }
                }

                if ((latVal === undefined || latVal === null || latVal === '') && enderecoVal) {
                    const coords = extractCoordinatesFromAddress(enderecoVal);
                    if (coords) {
                        latVal = coords.lat;
                        lonVal = coords.lon;
                        if (azimVal === null || azimVal === '') azimVal = coords.azim;
                    }
                }

                if (latVal === undefined || latVal === null || latVal === '') {
                    let cgiCode = '';
                    for (const key in row) {
                        if (!Object.prototype.hasOwnProperty.call(row, key)) continue;
                        const normKey = cleanString(key);
                        if (normKey === 'ultima cgi/erb' || normKey === 'primeira cgi/erb' || normKey === 'cgi/erb' || normKey === 'cgi' || normKey === 'erb') {
                            cgiCode = String(row[key] || '').trim();
                            break;
                        }
                    }
                    if (cgiCode && cgiMap && cgiMap[cgiCode]) {
                        latVal = cgiMap[cgiCode].lat;
                        lonVal = cgiMap[cgiCode].lon;
                        if (azimVal === null || azimVal === '') azimVal = cgiMap[cgiCode].azim;
                    }
                }

                if (latVal === undefined || latVal === null || latVal === '' || lonVal === undefined || lonVal === null || lonVal === '') return;

                const lat = parseCoordinate(latVal);
                const lon = parseCoordinate(lonVal);
                const azim = azimVal !== null && azimVal !== '' ? parseCoordinate(azimVal) : null;

                if (isNaN(lat) || isNaN(lon)) return;

                let dateTimeRaw = formatDateTimeValue(dataStr, horaStr);

                if (!dateTimeRaw) {
                    dateTimeRaw = fallbackDateTime || col4Val || 'Data Oculta';
                }

                const signature = `${dateTimeRaw}_${lat}_${lon}_${azim}`;
                if (globalUniqueSignatures.has(signature)) { duplicadosIgnorados++; return; }
                globalUniqueSignatures.add(signature);

                const eventId = 'evt_' + (++pointCounter);
                const defaultColor = (azim !== null && !isNaN(azim)) ? '#1e88e5' : '#e53935';

                pointMetadata[eventId] = { name: dateTimeRaw, visible: true, deleted: false, color: defaultColor, radius: 2000 };
                extractedPoints.push({ id: eventId, lat, lon, timestamp: Date.now(), azim });
            });

            if (extractedPoints.length === 0) {
                if (duplicadosIgnorados > 0) { return alert("Todos os registros eram duplicados."); }
                return alert("Nenhuma coordenada válida processada.");
            }

            loadedFilesData.push({
                id: ++fileCounter, name: fileName,
                allPoints: extractedPoints, filteredPoints: extractedPoints,
                layers: { heat: null, cluster: null, erbs: null }, isPlotted: false
            });
            updateFileListUI();
        }

                            rightDiv.appendChild(radiusInput);

                        const editBtn = document.createElement('button'); editBtn.className = 'icon-btn'; editBtn.innerHTML = '✏️';
                        editBtn.onclick = () => editPointName(pt.id);

        }

        function togglePlotFile(fileObj, btnElement) {
            if (fileObj.isPlotted) {
                fileObj.isPlotted = false;
                btnElement.innerText = 'Plotar'; btnElement.className = 'action-btn btn-plot';
            } else {
                fileObj.isPlotted = true;
                btnElement.innerText = 'Remover'; btnElement.className = 'action-btn btn-remove';
            }
            redrawAllPlotted(true); 
        }

        function aggregateActivePointsForDrawing(activePoints) {
            const groups = {};
            activePoints.forEach(pt => {
                const meta = pointMetadata[pt.id];
                const ptColor = meta.color; 
                const ptRadius = meta.radius || 2000; 
                const latKey = Math.round(pt.lat * 1000000);
                const lonKey = Math.round(pt.lon * 1000000);
                const key = `${latKey}_${lonKey}_${pt.azim}_${ptColor}_${ptRadius}`;
                
                if (!groups[key]) groups[key] = { lat: pt.lat, lon: pt.lon, azim: pt.azim, color: ptColor, radius: ptRadius, count: 0, names: [] };
                groups[key].count++;
                groups[key].names.push(meta.name);
            });
            return Object.values(groups);
        }

        // --- RENDERIZAÇÃO E REDRAW ---
        function redrawAllPlotted(shouldPan = false) {
            loadedFilesData.forEach(f => {
                if (f.layers.heat) map.removeLayer(f.layers.heat);
                if (f.layers.cluster) map.removeLayer(f.layers.cluster);
                if (f.layers.erbs) map.removeLayer(f.layers.erbs);
            });

            const allMarkersGroup = L.featureGroup();

            loadedFilesData.forEach(fileObj => {
                if (!fileObj.isPlotted || fileObj.filteredPoints.length === 0) return;

                const activeEvents = fileObj.filteredPoints.filter(pt => {
                    const meta = pointMetadata[pt.id];
                    return meta && !meta.deleted && meta.visible;
                });

                if (activeEvents.length === 0) return;

                const aggregatedData = aggregateActivePointsForDrawing(activeEvents);
                const heatPoints = aggregatedData.map(pt => [pt.lat, pt.lon, Math.min(pt.count / 5, 1)]);
                const heatLayer = L.heatLayer(heatPoints, { radius: 25, blur: 15, maxZoom: 17, gradient: {0.4: 'blue', 0.65: 'lime', 1: 'red'} });
                const markers = L.markerClusterGroup({ maxClusterRadius: 50, spiderfyOnMaxZoom: true, showCoverageOnHover: false });
                const erbsLayer = L.featureGroup();
                const beamwidth = 120; 

                aggregatedData.forEach(pt => {
                    let latestRecord = pt.names[0] || 'Data Oculta';

                    const icon = pt.count > 1 ? L.divIcon({ className: 'count-icon', html: pt.count, iconSize: [30,30], iconAnchor: [15,15] }) : null;
                    const marker = icon ? L.marker([pt.lat, pt.lon], {icon}) : L.circleMarker([pt.lat, pt.lon], {radius: 5, color: pt.color, fillOpacity: 0.8, weight: 1});
                    
                    // Configuração do Popup padrão simplificado para cliques
                    let popupText = `<strong>Último registro:</strong><br>${latestRecord}`;
                    if (pt.azim !== null && !isNaN(pt.azim)) {
                        popupText += `<br><small>Direção: ${pt.azim}° | Raio: ${pt.radius}m</small>`;
                    } else {
                        popupText += `<br><small>Eventos ativos agrupados: ${pt.count}</small>`;
                    }
                    
                    marker.bindPopup(popupText);
                    
                    // CORREÇÃO: Rótulos fixados e SEMPRE VISÍVEIS (permanent: true) para pontos normais (não ERB)
                    if (pt.azim === null || isNaN(pt.azim)) {
                        marker.bindTooltip(`<b>${latestRecord}</b>`, { 
                            permanent: true, 
                            direction: 'top', 
                            offset: [0, -5] 
                        });
                    }
                    
                    markers.addLayer(marker);

                    // Tratamento específico de ERB (Antenas)
                    if (pt.azim !== null && !isNaN(pt.azim)) {
                        const sectorPoints = createSector([pt.lat, pt.lon], pt.radius, pt.azim, beamwidth);
                        const erbPolygon = L.polygon(sectorPoints, { stroke: false, fillColor: 'rgba(0, 0, 255, 0.3)', fillOpacity: 1 });
                        
                        erbPolygon.bindPopup(`<strong>Último registro:</strong><br>${latestRecord}<br><small>Direção: ${pt.azim}° | Raio: ${pt.radius}m</small>`);
                        erbsLayer.addLayer(erbPolygon);

                        const endPoint = computeDestinationPoint({ lat: pt.lat, lng: pt.lon }, pt.radius, pt.azim);
                        erbsLayer.addLayer(L.polyline([[pt.lat, pt.lon], endPoint], { color: 'red', weight: 2, opacity: 0.8 }));
                        L.circleMarker([pt.lat, pt.lon], { radius: 3, color: '#000', fillColor: '#000', fillOpacity: 1 }).addTo(erbsLayer);
                    }
                });

                map.addLayer(heatLayer); map.addLayer(erbsLayer); map.addLayer(markers);   
                fileObj.layers.heat = heatLayer; fileObj.layers.cluster = markers; fileObj.layers.erbs = erbsLayer;
                allMarkersGroup.addLayer(markers);
            });

            if (shouldPan && Object.keys(allMarkersGroup._layers).length > 0) {
                map.fitBounds(allMarkersGroup.getBounds().pad(0.1), { animate: true, duration: 1 });
            }
            updateImportedDataUI();
        }
    </script>
</body>
